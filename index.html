<!DOCTYPE html>
<html>
<head>
    <title>Loan Prediction</title>

    <style>
        body{
            font-family:Arial;
            text-align:center;
            background:#f2f2f2;
        }

        .box{
            margin-top:100px;
            display:inline-block;
            padding:30px;
            background:white;
            border-radius:15px;
            box-shadow:0px 0px 15px gray;
        }

        input{
            width:250px;
            padding:10px;
            margin:10px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        button{
            padding:10px 25px;
            background:green;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }
    </style>

</head>

<body>

    <div class="box">

        <h2>Loan Eligibility Prediction</h2>

        <!-- 👉 Form sends data to Flask -->
        <form action="/predict" method="post">

            <input type="number" name="income" placeholder="Enter Income" required><br>

            <input type="number" name="loanamount" placeholder="Enter Loan Amount" required><br>

            <input type="number" name="credithistory" placeholder="Credit History (1 or 0)" required><br>

            <button type="submit">Predict</button>

        </form>

    </div>

</body>
</html>
